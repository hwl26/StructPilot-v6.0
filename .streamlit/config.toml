[theme]
primaryColor = "#3b82f6"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#1e293b"
font = "sans serif"

[server]
headless = true
port = 8501
# 保留 XSRF 防护（Cloud 部署必需），CORS 由其自动管理，不显式关闭以免冲突
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
