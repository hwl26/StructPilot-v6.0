<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StructPilot Desk Pet</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
</style>
<script>
(function() {
    function sendMessageToStreamlitClient(type, data) {
        var outData = Object.assign({ isStreamlitMessage: true, type: type }, data);
        window.parent.postMessage(outData, "*");
    }
    var _streamlitApi = {
        setComponentReady: function() {
            sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
        },
        setFrameHeight: function(height) {
            sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: height });
        },
        setComponentValue: function(value) {
            sendMessageToStreamlitClient("streamlit:setComponentValue", { value: value });
        },
        RENDER_EVENT: "streamlit:render",
        events: {
            addEventListener: function(type, callback) {
                window.addEventListener("message", function(event) {
                    if (event.data && event.data.type === type) {
                        event.detail = event.data;
                        callback(event);
                    }
                });
            }
        }
    };
    window.Streamlit = _streamlitApi;

    function render(args) {
        if (!args || !args.html) return;
        var savedStreamlit = window.Streamlit;
        document.open();
        document.write(args.html);
        document.close();
        window.Streamlit = savedStreamlit;
    }

    _streamlitApi.events.addEventListener(_streamlitApi.RENDER_EVENT, function(e) {
        render(e.detail.args);
    });
    _streamlitApi.setComponentReady();
    _streamlitApi.setFrameHeight(0);
})();
</script>
</head>
<body>
</body>
</html>
